<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng sản phẩm</title>
</head>
<body>
    <form id="frmInBangCC">
        <h2>In Bảng Cửu Chương</h2>
        <label for="so">Nhập số:</label>
        <input type="number" id="so" name="so" min="1" max="10">
        <button type="button" onclick="inBangCuuChuong()">In Bảng</button>
    </form>
    <div id="cuuChuongTable"></div>

    <script>
        function inBangCuuChuong() {
            const so = document.getElementById('so').value;
            if (!so || so < 1 || so > 10) {
                alert('Vui lòng nhập số từ 1 đến 10!');
                return;
            }
            let tableHTML = '<table><thead><tr><th>' + so + ' x</th><th>Kết quả</th></tr></thead><tbody>';
            for (let i = 1; i <= 10; i++) {
                tableHTML += '<tr><td>' + so + ' x ' + i + '</td><td class="number">' + (so * i) + '</td></tr>';
            }
            tableHTML += '</tbody></table>';
            document.getElementById('cuuChuongTable').innerHTML = tableHTML;
        }
    </script>
</body>
</html>
